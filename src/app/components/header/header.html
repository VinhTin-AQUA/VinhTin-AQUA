<!-- Header -->
<header
    class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-gray-900 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 transition-colors duration-300"
>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 md:h-20">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img
                        src="https://ui-avatars.com/api/?name=John+Doe&size=40&background=4F46E5&color=fff&bold=true"
                        alt="Avatar"
                        class="w-10 h-10 rounded-full ring-2 ring-indigo-500/20 dark:ring-indigo-400/30 shadow-md transition-all hover:scale-105 cursor-pointer"
                    />
                    <span
                        class="absolute bottom-0 right-0 block w-2.5 h-2.5 bg-green-400 rounded-full ring-2 ring-white dark:ring-gray-900"
                    ></span>
                </div>
                <div>
                    <h1 class="text-sm font-semibold text-gray-800 dark:text-white leading-tight">
                        John Doe
                    </h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400">Frontend Dev</p>
                </div>
            </div>

            <nav class="hidden md:flex items-center gap-1 lg:gap-2">
                @for (menuItem of menuItems(); track $index) {
                    <a
                        [href]="menuItem.href"
                        class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-800 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all duration-200"
                        >{{ menuItem.label }}</a
                    >
                }
            </nav>

            <div class="flex items-center gap-2 sm:gap-3">
                <div
                    class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-full p-1 shadow-inner"
                >
                    <button
                        (click)="setTheme('light')"
                        class="p-1.5 rounded-full transition-all duration-200"
                        [class]="
                            currentTheme() === 'light'
                                ? 'bg-white dark:bg-gray-700 shadow-md text-indigo-600'
                                : 'text-gray-500 dark:text-gray-400 hover:text-indigo-500'
                        "
                        aria-label="Light theme"
                    >
                        <app-icons iconName="light" class="w-5 h-5"></app-icons>
                    </button>

                    <button
                        (click)="setTheme('dark')"
                        class="p-1.5 rounded-full transition-all duration-200"
                        [class]="
                            currentTheme() === 'dark'
                                ? 'bg-white dark:bg-gray-700 shadow-md text-indigo-600'
                                : 'text-gray-500 dark:text-gray-400 hover:text-indigo-500'
                        "
                        aria-label="Dark theme"
                    >
                        <app-icons iconName="dark" class="w-5 h-5"></app-icons>
                    </button>
                </div>

                <button
                    class="relative inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 rounded-full shadow-md hover:shadow-lg transition-all duration-200 group"
                >
                    <app-icons iconName="cv" class="w-4 h-4"></app-icons>
                    <span>CV</span>
                    <span class="absolute -top-1 -right-1 flex h-3 w-3">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"
                        ></span>
                        <span
                            class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"
                        ></span>
                    </span>
                </button>

                <button
                    (click)="toggleMobileMenu()"
                    class="md:hidden p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors relative z-50"
                    aria-label="Toggle menu"
                >
                    @if (!isMobileMenuOpen()) {
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-6 w-6"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M4 6h16M4 12h16M4 18h16"
                            />
                        </svg>
                    }

                    @if (isMobileMenuOpen()) {
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-6 w-6"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M6 18L18 6M6 6l12 12"
                            />
                        </svg>
                    }
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Mobile Menu Overlay -->
@if (isMobileMenuOpen()) {
    <div
        class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm md:hidden"
        (click)="closeMobileMenu()"
        [class]="
            isMobileMenuOpen() ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'
        "
        style="transition: opacity 0.3s ease-in-out"
    ></div>
}

<!-- Mobile Menu Slide from Right -->
<div
    class="fixed top-0 right-0 h-full w-64 sm:w-80 z-50 bg-white dark:bg-gray-900 shadow-2xl md:hidden transform transition-transform duration-300 ease-in-out"
    [class]="isMobileMenuOpen() ? 'translate-x-0' : 'translate-x-full'"
    style="transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)"
>
    <div class="flex flex-col h-full">
        <!-- Mobile Menu Header -->
        <div
            class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700"
        >
            <div class="flex items-center gap-3">
                <img
                    src="https://ui-avatars.com/api/?name=John+Doe&size=40&background=4F46E5&color=fff&bold=true"
                    alt="Avatar"
                    class="w-10 h-10 rounded-full ring-2 ring-indigo-500/20 dark:ring-indigo-400/30 shadow-md"
                />
                <div>
                    <h2 class="text-sm font-semibold text-gray-800 dark:text-white">John Doe</h2>
                    <p class="text-xs text-gray-500 dark:text-gray-400">Frontend Dev</p>
                </div>
            </div>
            <button
                (click)="closeMobileMenu()"
                class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                aria-label="Close menu"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Mobile Menu Navigation -->
        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            @for (item of menuItems(); track item.label) {
                <a
                    [href]="item.href"
                    class="block px-4 py-3 text-sm font-medium text-gray-700 dark:text-gray-200 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-800 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all duration-200"
                    (click)="closeMobileMenu()"
                >
                    <span class="flex items-center gap-3">
                        <span [innerHTML]="item.icon"></span>
                        {{ item.label }}
                    </span>
                </a>
            }
        </nav>

        <!-- Mobile Menu Footer -->
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-500 dark:text-gray-400">Theme</span>
                <div
                    class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-full p-1 shadow-inner"
                >
                    <button
                        (click)="setTheme('light'); closeMobileMenu()"
                        class="p-1.5 rounded-full transition-all duration-200"
                        [class]="
                            currentTheme() === 'light'
                                ? 'bg-white dark:bg-gray-700 shadow-md text-indigo-600'
                                : 'text-gray-500 dark:text-gray-400 hover:text-indigo-500'
                        "
                        aria-label="Light theme"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                            />
                        </svg>
                    </button>
                    <button
                        (click)="setTheme('dark'); closeMobileMenu()"
                        class="p-1.5 rounded-full transition-all duration-200"
                        [class]="
                            currentTheme() === 'dark'
                                ? 'bg-white dark:bg-gray-700 shadow-md text-indigo-600'
                                : 'text-gray-500 dark:text-gray-400 hover:text-indigo-500'
                        "
                        aria-label="Dark theme"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
                            />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
