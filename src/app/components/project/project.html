<!-- src/app/app.component.html -->
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">
                    Projects
                </h2>
                <span
                    class="text-sm text-gray-500 dark:text-gray-400 bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-full"
                    >{{ projects.length }} projects</span
                >
            </div>

            <!-- Projects Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                @for (project of projects; track project.id) {
                    <div
                        class="bg-white dark:bg-gray-800 rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col"
                    >
                        <!-- Image -->
                        <div class="relative h-48 overflow-hidden bg-gray-200 dark:bg-gray-700">
                            <img
                                [src]="project.image"
                                [alt]="project.title"
                                class="w-full h-full object-cover"
                                loading="lazy"
                            />
                            <div
                                class="absolute top-2 right-2 bg-black/60 text-white text-xs px-3 py-1 rounded-full backdrop-blur-sm"
                            >
                                {{ project.techStack[0] }}
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="p-5 flex flex-col flex-1">
                            <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-1">
                                {{ project.title }}
                            </h3>
                            <p class="text-sm text-gray-600 dark:text-gray-300 mb-3 line-clamp-2">
                                {{ project.description }}
                            </p>

                            <!-- Tech tags -->
                            <div class="flex flex-wrap gap-1.5 mb-4">
                                @for (tech of project.techStack; track tech) {
                                    <span
                                        class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs px-3 py-1 rounded-full"
                                        >{{ tech }}</span
                                    >
                                }
                            </div>

                            <!-- Actions -->
                            <div
                                class="mt-auto flex items-center justify-between pt-2 border-t border-gray-100 dark:border-gray-700"
                            >
                                <a
                                    [href]="project.github"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    class="inline-flex items-center gap-1 text-sm font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                                >
                                    <span>GitHub</span>
                                    <span class="text-lg">↗</span>
                                </a>
                                <!-- <a
                                    [href]="project.demo"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    class="inline-flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-full transition-colors duration-200 shadow-sm"
                                >
                                    <span>Live Demo</span>
                                    <span class="text-lg">→</span>
                                </a> -->
                            </div>
                        </div>
                    </div>
                } @empty {
                    <div class="col-span-full text-center py-12 text-gray-500 dark:text-gray-400">
                        No projects available.
                    </div>
                }
            </div>
        </section>
    </main>
</div>
