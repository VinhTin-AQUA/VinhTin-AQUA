<!-- src/app/app.component.html -->
<div class="min-h-screen theme-page transition-colors duration-300">
    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-extrabold theme-title">Projects</h2>
                <span class="text-sm theme-badge px-3 py-1 rounded-full">
                    {{ projects.length }} projects
                </span>
            </div>
            <!-- Projects Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                @for (project of projects; track project.id) {
                    <div
                        class="theme-card rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col project-card"
                    >
                        <!-- Image -->
                        <div class="relative h-48 overflow-hidden theme-image-placeholder">
                            <img
                                [src]="project.image"
                                [alt]="project.title"
                                class="w-full h-full object-cover"
                                loading="lazy"
                            />
                            <div
                                class="absolute top-2 right-2 theme-tech-badge text-xs px-3 py-1 rounded-full backdrop-blur-sm"
                            >
                                {{ project.techStack[0] }}
                            </div>
                        </div>
                        <!-- Content -->
                        <div class="p-5 flex flex-col flex-1">
                            <h3 class="text-xl font-bold theme-project-title mb-1">
                                {{ project.title }}
                            </h3>
                            <p class="text-sm theme-project-description mb-3 line-clamp-2">
                                {{ project.description }}
                            </p>
                            <!-- Tech tags -->
                            <div class="flex flex-wrap gap-1.5 mb-4">
                                @for (tech of project.techStack; track tech) {
                                    <span class="theme-tag text-xs px-3 py-1 rounded-full">
                                        {{ tech }}
                                    </span>
                                }
                            </div>
                            <!-- Actions -->
                            <div
                                class="mt-auto flex items-center justify-between pt-2 border-t theme-divider"
                            >
                                <a
                                    [href]="project.github"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    class="inline-flex items-center gap-1 text-sm font-medium theme-link transition-colors"
                                >
                                    <span>GitHub</span> <span class="text-lg">↗</span>
                                </a>
                                <!-- <a [href]="project.demo" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-full transition-colors duration-200 shadow-sm" > <span>Live Demo</span> <span class="text-lg">→</span> </a> -->
                            </div>
                        </div>
                    </div>
                } @empty {
                    <div class="col-span-full text-center py-12 theme-empty">
                        No projects available.
                    </div>
                }
            </div>
        </section>
    </main>
</div>
