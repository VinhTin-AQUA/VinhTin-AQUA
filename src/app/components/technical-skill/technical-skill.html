<!-- src/app/app.component.html -->
<div
    class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-900 dark:to-slate-800 p-6 transition-colors duration-300"
>
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center">
            <h1
                class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-800 dark:text-white"
            >
                Tech Stack
            </h1>
            <p class="mt-2 text-lg text-slate-500 dark:text-slate-300">
                Modern tools & technologies we use
            </p>
            <div
                class="mt-4 h-1 w-24 mx-auto rounded-full bg-gradient-to-r from-blue-500 to-purple-500"
            ></div>
        </header>

        <!-- Technical Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-fr">
            @for (category of technicalData; track category.name) {
                <div
                    class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 p-6 border border-slate-200/50 dark:border-slate-700/50 flex flex-col"
                >
                    <!-- Category Header -->
                    <div class="flex items-center gap-3 mb-4">
                        <div
                            class="p-2 rounded-lg bg-gradient-to-br from-blue-500/10 to-purple-500/10 dark:from-blue-400/20 dark:to-purple-400/20"
                        >
                            <span class="text-2xl">{{ category.icon }}</span>
                        </div>
                        <h2 class="text-xl font-bold text-slate-700 dark:text-slate-200">
                            {{ category.name }}
                        </h2>
                    </div>

                    <!-- Tech items -->
                    <ul class="space-y-2.5 flex-1">
                        @for (tech of category.items; track tech) {
                            <li
                                class="flex items-center gap-2.5 text-slate-600 dark:text-slate-300"
                            >
                                <span
                                    class="w-1.5 h-1.5 rounded-full bg-blue-500 dark:bg-blue-400 flex-shrink-0"
                                ></span>
                                <span class="font-medium">{{ tech }}</span>
                            </li>
                        }
                    </ul>

                    <!-- Decorative footer -->
                    <div
                        class="mt-4 pt-3 border-t border-slate-200/60 dark:border-slate-700/60 flex justify-between text-xs text-slate-400 dark:text-slate-500"
                    >
                        <span>{{ category.items.length }} technologies</span>
                        <span>✦</span>
                    </div>
                </div>
            }
        </div>
    </div>
</div>
