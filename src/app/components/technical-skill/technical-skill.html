<!-- src/app/app.component.html -->
<div class="min-h-screen p-6 transition-colors duration-300 theme-bg-gradient">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight theme-text-primary">
                Technical Skills
            </h1>
            <p class="mt-2 text-lg theme-text-muted">Modern tools & technologies I use</p>
            <div class="mt-4 h-1 w-24 mx-auto rounded-full theme-gradient-primary"></div>
        </header>

        <!-- Technical Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-fr">
            @for (category of technicalData; track category.name) {
                <div
                    class="theme-card rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 p-6 flex flex-col card-animate hover-lift"
                >
                    <!-- Category Header -->
                    <div class="flex items-center gap-3 mb-4">
                        <div class="p-2 rounded-lg theme-icon-bg">
                            <span class="text-2xl">{{ category.icon }}</span>
                        </div>
                        <h2 class="text-xl font-bold theme-text-secondary">
                            {{ category.name }}
                        </h2>
                    </div>

                    <!-- Tech items -->
                    <ul class="space-y-2.5 flex-1">
                        @for (tech of category.items; track tech) {
                            <li class="flex items-center gap-2.5 theme-text-secondary">
                                <span
                                    class="w-1.5 h-1.5 rounded-full theme-dot-blue shrink-0"
                                ></span>
                                <span class="font-medium">{{ tech }}</span>
                            </li>
                        }
                    </ul>

                    <!-- Decorative footer -->
                    <div
                        class="mt-4 pt-3 theme-divider flex justify-between text-xs theme-text-muted"
                    >
                        <span>{{ category.items.length }} technologies</span>
                        <span class="theme-accent-blue">✦</span>
                    </div>
                </div>
            }
        </div>
    </div>
</div>
