@if (init()) {
    <div class="body relative overflow-hidden min-h-screen">
        <div class="background-grid"></div>

        <div class="gradient gradient-1"></div>
        <div class="gradient gradient-2"></div>
        <div class="gradient gradient-3"></div>
        <div class="gradient gradient-4"></div>

        <div class="relative z-10">
            <app-header></app-header>

            <app-about-me id="about-me"></app-about-me>

            @defer (on viewport; prefetch on idle) {
                <div class="section-enter">
                    <app-career id="career"></app-career>
                </div>
            } @placeholder {
                <div class="min-h-75"></div>
            }

            @defer (on viewport; prefetch on idle) {
                <div class="section-enter">
                    <app-technical-skill id="technical-skill"></app-technical-skill>
                </div>
            } @placeholder {
                <div class="min-h-75"></div>
            }

            @defer (on viewport; prefetch on idle) {
                <div class="section-enter">
                    <app-project id="project"></app-project>
                </div>
            } @placeholder {
                <div class="min-h-75"></div>
            }

            @defer (on viewport; prefetch on idle) {
                <div class="section-enter">
                    <app-footer></app-footer>
                </div>
            } @placeholder {
                <div class="min-h-75"></div>
            }
        </div>
    </div>
}
